
[functions.fetch-meta-ads-data]
enabled = true
verify_jwt = true
import_map = "./functions/fetch-meta-ads-data/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/fetch-meta-ads-data/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/fetch-meta-ads-data/*.html" ]

[functions.start-meta-oauth]
enabled = true
verify_jwt = false
entrypoint = "./functions/start-meta-oauth/index.ts"

[functions.complete-meta-oauth]
enabled = true
verify_jwt = false
entrypoint = "./functions/complete-meta-oauth/index.ts"

[functions.finalize-meta-oauth]
enabled = true
verify_jwt = false
entrypoint = "./functions/finalize-meta-oauth/index.ts"
